name: Build APK

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Wrapper is committed at the AGP-compatible Gradle version (8.13+).
      # No need to regenerate it on every run — that step actually *broke*
      # the build by downgrading the wrapper to 8.7 below AGP's minimum.

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gyaale-pos-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
